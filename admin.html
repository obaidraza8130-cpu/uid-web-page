<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>
<script src="/socket.io/socket.io.js"></script>

<style>
body {
    margin:0;
    background:#0f172a;
    color:white;
    font-family:sans-serif;
}

#particles-js {
    position:fixed;
    width:100%;
    height:100%;
    z-index:-1;
}

header {
    display:flex;
    justify-content:space-between;
    padding:15px;
    background:#020617;
}

button {
    padding:8px 12px;
    border:none;
    cursor:pointer;
}

.logout { background:red; color:white; }

.container {
    padding:20px;
}

table {
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

th,td {
    padding:10px;
    border-bottom:1px solid #334155;
}

th { background:#1e293b; }

.delete {
    background:red;
    color:white;
}
</style>
</head>

<body>

<div id="particles-js"></div>

<header>
<h2>🎮 Admin Dashboard</h2>
<button class="logout" onclick="logout()">Logout</button>
</header>

<div class="container">

<h3>Users</h3>

<table>
<thead>
<tr>
<th>Name</th>
<th>UID</th>
<th>Email</th>
<th>Team</th>
<th>Device</th>
<th>Game</th>
<th>Action</th>
</tr>
</thead>

<tbody id="data"></tbody>
</table>

</div>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

<script>
particlesJS("particles-js", { particles:{ number:{value:50}, size:{value:2} } });

const socket = io();

function load(){
fetch("/data")
.then(r=>r.json())
.then(d=>{
data.innerHTML="";
d.forEach(u=>{
data.innerHTML+=`
<tr>
<td>${u.name}</td>
<td>${u.uid}</td>
<td>${u.email}</td>
<td>${u.team||"-"}</td>
<td>${u.device}</td>
<td>${u.game}</td>
<td><button class="delete" onclick="del(${u.id})">Delete</button></td>
</tr>`;
});
});
}

function del(id){
fetch("/delete/"+id,{method:"DELETE"}).then(load);
}

function logout(){
location.href="/logout";
}

socket.on("new-user", load);
socket.on("refresh", load);

load();
</script>

</body>
</html>
