<!DOCTYPE html>
<html>
<head>
    <title>Registration</title>
</head>

<body style="background:#0b1220;color:white;font-family:Arial;display:flex;justify-content:center;align-items:center;height:100vh;">

<div style="background:#111827;padding:20px;border-radius:10px;width:320px;">

<h2>🎮 Register</h2>

<form action="/submit" method="POST">

<input name="name" placeholder="Name" required style="width:100%;padding:10px;margin:5px;">
<input name="uid" placeholder="UID" required style="width:100%;padding:10px;margin:5px;">
<input name="email" placeholder="Email" required style="width:100%;padding:10px;margin:5px;">
<input name="team" placeholder="Team" style="width:100%;padding:10px;margin:5px;">

<select name="device" required style="width:100%;padding:10px;margin:5px;">
<option>Mobile</option>
<option>PC</option>
</select>

<select name="game" required style="width:100%;padding:10px;margin:5px;">
<option>Free Fire</option>
<option>BGMI</option>
<option>COD</option>
</select>

<button type="submit" style="width:100%;padding:10px;background:green;color:white;">Register</button>

</form>

</div>

</body>
</html>
