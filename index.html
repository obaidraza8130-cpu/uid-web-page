<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <style>
        body{
            background:#0b1220;
            color:white;
            font-family:Arial;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }
        .box{
            background:#111827;
            padding:20px;
            border-radius:10px;
            width:300px;
        }
        input,button{
            width:100%;
            padding:10px;
            margin:8px 0;
            border:none;
            border-radius:6px;
        }
        button{
            background:#22c55e;
            font-weight:bold;
            cursor:pointer;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Login</h2>

    <form onsubmit="login(event)">
        <input id="user" placeholder="Username" required>
        <input id="pass" type="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>
</div>

<script>
function login(e){
    e.preventDefault();

    const u = document.getElementById("user").value;
    const p = document.getElementById("pass").value;

    if(u === "admin" && p === "1234"){
        window.location.href = "/admin";
    } else {
        alert("Wrong credentials");
    }
}
</script>

</body>
</html>
