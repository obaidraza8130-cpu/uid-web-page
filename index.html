<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>
<body style="background:#0b1220;color:white;font-family:Arial;display:flex;justify-content:center;align-items:center;height:100vh;">

<div style="background:#111827;padding:20px;border-radius:10px;width:300px;">
    <h2>Login</h2>

    <input id="u" placeholder="Username" style="width:100%;padding:10px;margin:5px;">
    <input id="p" type="password" placeholder="Password" style="width:100%;padding:10px;margin:5px;">

    <button onclick="login()" style="width:100%;padding:10px;background:green;color:white;">Login</button>
</div>

<script>
function login(){
    let u = document.getElementById("u").value;
    let p = document.getElementById("p").value;

    if(u === "admin" && p === "1234"){
        window.location.href = "/admin";
    } else {
        alert("Wrong credentials");
    }
}
</script>

</body>
</html>
