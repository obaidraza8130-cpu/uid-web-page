<!DOCTYPE html>
<html>
<head>
    <title>UID Collection</title>

    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
            margin-top: 100px;
        }

        .box {
            background: #1e293b;
            padding: 30px;
            border-radius: 10px;
            width: 300px;
            margin: auto;
        }

        input {
            padding: 10px;
            width: 90%;
            border: none;
            border-radius: 5px;
            margin-bottom: 15px;
        }

        button {
            padding: 10px 20px;
            border: none;
            background: #38bdf8;
            color: black;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #0ea5e9;
        }
    </style>
</head>

<body>

    <div class="box">
        <h2>Enter Your UID</h2>

        <form action="/submit" method="POST">
            <input type="text" name="uid" placeholder="Enter UID" required>
            <br>
            <button type="submit">Submit</button>
        </form>

        <br>

        <a href="https://uid-web-page.onrender.com/uids" style="color:#38bdf8;">
            View All UIDs
        </a>
    </div>

</body>
</html>
