<!DOCTYPE html>
<html>
<head>
    <title>Registration</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0b1220;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .box {
            background: #111827;
            padding: 25px;
            border-radius: 12px;
            width: 340px;
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.2);
        }

        h2 {
            text-align: center;
            color: #22c55e;
            margin-bottom: 20px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: none;
            border-radius: 8px;
            background: #1f2937;
            color: white;
            outline: none;
        }

        input:focus, select:focus {
            box-shadow: 0 0 10px #22c55e;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            border-radius: 8px;
            background: #22c55e;
            color: black;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #16a34a;
        }
    </style>
</head>

<body>

<div class="box">

    <h2>🎮 Register</h2>

    <form action="/submit" method="POST">

        <input type="text" name="name" placeholder="Name" required>

        <input type="text" name="uid" placeholder="UID" required>

        <input type="email" name="email" placeholder="Email" required>

        <input type="text" name="team" placeholder="Team (optional)">

        <select name="device" required>
            <option value="">Select Device</option>
            <option>Mobile</option>
            <option>PC</option>
        </select>

        <select name="game" required>
            <option value="">Select Game</option>
            <option>Free Fire</option>
            <option>BGMI</option>
            <option>COD</option>
        </select>

        <button type="submit">Register</button>

    </form>

</div>

</body>
</html>
