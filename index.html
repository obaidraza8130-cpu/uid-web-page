<!DOCTYPE html>
<html>
<head>
<title>Gaming App</title>
<script src="/socket.io/socket.io.js"></script>

<style>
body {
    margin:0;
    font-family:sans-serif;
    background:#0f172a;
    color:white;
}

#particles-js {
    position:fixed;
    width:100%;
    height:100%;
    z-index:-1;
}

.container {
    max-width:400px;
    margin:80px auto;
    background:rgba(255,255,255,0.05);
    padding:25px;
    border-radius:12px;
}

input,select,button {
    width:100%;
    padding:10px;
    margin:8px 0;
    border:none;
}

button {
    background:#22c55e;
    color:white;
    cursor:pointer;
}

table {
    width:100%;
    margin-top:20px;
    border-collapse:collapse;
}

td,th {
    padding:8px;
    border-bottom:1px solid #333;
}
</style>
</head>

<body>

<div id="particles-js"></div>

<div class="container" id="app"></div>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

<script>
particlesJS("particles-js",{particles:{number:{value:60}}});

const socket = io();
const app = document.getElementById("app");

// 🔐 CHECK LOGIN
async function init(){
    const res = await fetch("/check-auth");
    const data = await res.json();

    if(data.auth) showAdmin();
    else showLogin();
}

// LOGIN UI
function showLogin(){
app.innerHTML = `
<h2>Admin Login</h2>
<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<p id="err"></p>
`;
}

// LOGIN
async function login(){
const res = await fetch("/login",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({
username:user.value,
password:pass.value
})
});
const d = await res.json();
if(d.success) showAdmin();
else err.innerText="Wrong login";
}

// REGISTER UI
function showRegister(){
app.innerHTML += `
<h3>Register Player</h3>
<input id="name" placeholder="Name">
<input id="uid" placeholder="UID">
<input id="email" placeholder="Email">
<input id="team" placeholder="Team">

<select id="device">
<option>Mobile</option>
<option>PC</option>
</select>

<select id="game">
<option>Free Fire</option>
<option>BGMI</option>
<option>COD</option>
</select>

<button onclick="register()">Register</button>
`;
}

// REGISTER
async function register(){
await fetch("/submit",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({
name:name.value,
uid:uid.value,
email:email.value,
team:team.value,
device:device.value,
game:game.value
})
});
load();
}

// ADMIN UI
function showAdmin(){
app.innerHTML = `
<h2>Admin Dashboard</h2>
<button onclick="logout()">Logout</button>
<div id="table"></div>
`;
showRegister();
load();
}

// LOAD DATA
async function load(){
const res = await fetch("/data");
const data = await res.json();

let html = "<table><tr><th>Name</th><th>UID</th><th>Game</th><th>Action</th></tr>";

data.forEach(u=>{
html+=`<tr>
<td>${u.name}</td>
<td>${u.uid}</td>
<td>${u.game}</td>
<td><button onclick="del(${u.id})">Delete</button></td>
</tr>`;
});

html+="</table>";
document.getElementById("table").innerHTML = html;
}

// DELETE
function del(id){
fetch("/delete/"+id,{method:"DELETE"});
}

// LOGOUT
async function logout(){
await fetch("/logout");
showLogin();
}

// SOCKET LIVE UPDATE
socket.on("update", load);

init();
</script>

</body>
</html>
