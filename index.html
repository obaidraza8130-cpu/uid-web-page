<!DOCTYPE html>
<html>
<head>
    <title>Gaming Registration</title>
    <style>
        body {
            font-family: Arial;
            background: #020617;
            color: white;
            text-align: center;
            margin-top: 50px;
        }

        .box {
            background: #0f172a;
            padding: 30px;
            border-radius: 10px;
            width: 350px;
            margin: auto;
        }

        input, select {
            padding: 10px;
            width: 90%;
            margin-bottom: 12px;
            border-radius: 5px;
            border: none;
        }

        button {
            padding: 10px 20px;
            background: #22c55e;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        a {
            color: #22c55e;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>🎮 Game Registration</h2>

    <form action="/submit" method="POST">

        <input type="text" name="name" placeholder="Player Name" required>
        <input type="text" name="uid" placeholder="Game UID" required>
        <input type="email" name="email" placeholder="Email" required>
        <input type="text" name="team" placeholder="Team Name">

        <select name="device" required>
            <option value="">Select Device</option>
            <option>Mobile</option>
            <option>PC</option>
        </select>

        <select name="game" required>
            <option value="">Select Game</option>
            <option>Free Fire</option>
            <option>BGMI</option>
            <option>Call of Duty</option>
        </select>

        <button type="submit">Register</button>
    </form>

    <br>
    <a href="/login">Admin Login</a>
</div>

</body>
</html>
</div>

</body>
</html>
